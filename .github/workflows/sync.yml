name: Sync ideas from Notion

on:
  schedule:
    - cron: "*/15 * * * *"   # every ~15 min (GitHub may delay scheduled runs)
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: sync-ideas
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate data.json from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: 389f61b0-82dc-815e-bebd-e072a7eca965
        run: python sync_notion.py

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "idea-receipt bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "auto-sync ideas from Notion"
            git push
          else
            echo "No changes to data.json"
          fi
